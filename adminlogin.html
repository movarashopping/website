<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movara Shopping - Admin Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0d5c2d,#198754);
}

.login-box{
width:380px;
background:#fff;
padding:35px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.login-box h2{
text-align:center;
color:#0d5c2d;
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:12px;
border:none;
background:#0d5c2d;
color:#fff;
font-size:17px;
border-radius:8px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#09401f;
}

#message{
margin-top:15px;
text-align:center;
font-weight:bold;
color:red;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Movara Admin Login</h2>

<input
type="email"
id="email"
placeholder="Enter Email">

<input
type="password"
id="password"
placeholder="Enter Password">

<button id="loginBtn">
Login
</button>

<div id="message"></div>

</div>

<script type="module" src="login.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customers - Movara Admin</title>

<link rel="stylesheet" href="admin.css">

<style>

.container{
max-width:1200px;
margin:30px auto;
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.topbar h2{
color:#0d5c2d;
}

.btn{
background:#0d5c2d;
color:#fff;
padding:10px 18px;
text-decoration:none;
border-radius:8px;
font-weight:bold;
margin-left:10px;
}

.btn:hover{
background:#083c1c;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#0d5c2d;
color:#fff;
padding:12px;
}

td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:center;
}

img{
width:50px;
height:50px;
border-radius:50%;
object-fit:cover;
}

.status{
color:green;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<div class="topbar">

<h2>Customers</h2>

<div>
<a href="admin.html" class="btn">Dashboard</a>
<a href="orders.html" class="btn">Orders</a>
<a href="products.html" class="btn">Products</a>
</div>

</div>

<table>

<thead>

<tr>
<th>Photo</th>
<th>Name</th>
<th>Email</th>
<th>Mobile</th>
<th>Orders</th>
<th>Status</th>
</tr>

</thead>

<tbody id="customerTable">

<tr>
<td>
<img src="https://via.placeholder.com/50" alt="Customer">
</td>

<td>Prince Sharma</td>

<td>movaraindustries@gmail.com</td>

<td>+91 7983001102</td>

<td>0</td>

<td class="status">Active</td>

</tr>

<tr>
<td colspan="6">
Customers will load automatically from Firebase.
</td>
</tr>

</tbody>

</table>

</div>

<script type="module" src="customers.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products - Movara Admin</title>

<link rel="stylesheet" href="admin.css">

<style>
.container{
max-width:1200px;
margin:30px auto;
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.topbar h2{
color:#0d5c2d;
}

.btn{
background:#0d5c2d;
color:#fff;
padding:10px 18px;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}

.btn:hover{
background:#0a4721;
}

table{
width:100%;
border-collapse:collapse;
}

table th{
background:#0d5c2d;
color:#fff;
padding:12px;
}

table td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:center;
}

table img{
width:70px;
height:70px;
object-fit:cover;
border-radius:8px;
}

.edit{
background:#2196F3;
color:#fff;
padding:8px 12px;
border:none;
border-radius:5px;
cursor:pointer;
}

.delete{
background:#f44336;
color:#fff;
padding:8px 12px;
border:none;
border-radius:5px;
cursor:pointer;
}
</style>

</head>

<body>

<div class="container">

<div class="topbar">
<h2>All Products</h2>

<div>
<a href="admin.html" class="btn">Dashboard</a>
<a href="add-product.html" class="btn">Add Product</a>
</div>

</div>

<table>

<thead>

<tr>
<th>Image</th>
<th>Name</th>
<th>Price</th>
<th>Stock</th>
<th>Category</th>
<th>Action</th>
</tr>

</thead>

<tbody id="productTable">

<tr>
<td colspan="6">
No Products Found
</td>
</tr>

</tbody>

</table>

</div>

<script type="module" src="products.js"></script>

</body>
</html>

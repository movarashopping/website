<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Product - Movara Admin</title>

<link rel="stylesheet" href="admin.css">

<style>
.container{
max-width:800px;
margin:40px auto;
background:#fff;
padding:25px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

h2{
text-align:center;
margin-bottom:20px;
color:#0d5c2d;
}

input,select,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

textarea{
height:120px;
resize:none;
}

button{
width:100%;
padding:14px;
background:#0d5c2d;
color:#fff;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#0a4721;
}

a{
display:inline-block;
margin-bottom:20px;
text-decoration:none;
color:#0d5c2d;
font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<a href="admin.html">⬅ Back to Dashboard</a>

<h2>Add New Product</h2>

<form id="productForm">

<input
type="text"
id="name"
placeholder="Product Name"
required>

<input
type="number"
id="price"
placeholder="Price"
required>

<input
type="number"
id="stock"
placeholder="Stock"
required>

<select id="category" required>

<option value="">Select Category</option>

<option>Spices</option>
<option>Tea & Coffee</option>
<option>Snacks</option>
<option>Rice</option>
<option>Flour</option>
<option>Oil</option>
<option>Grocery</option>

</select>

<input
type="text"
id="image"
placeholder="Image URL">

<textarea
id="description"
placeholder="Product Description"></textarea>

<button type="submit">
Add Product
</button>

</form>

</div>

<script type="module" src="add-product.js"></script>

</body>
</html>

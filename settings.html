<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings - Movara Admin</title>

<link rel="stylesheet" href="admin.css">

<style>

.container{
max-width:900px;
margin:30px auto;
background:#fff;
padding:25px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

h2{
color:#0d5c2d;
margin-bottom:20px;
text-align:center;
}

.card{
margin-bottom:20px;
padding:20px;
border:1px solid #ddd;
border-radius:8px;
}

label{
display:block;
margin-top:12px;
font-weight:bold;
}

input{
width:100%;
padding:12px;
margin-top:6px;
border:1px solid #ccc;
border-radius:6px;
}

button{
margin-top:20px;
padding:12px 20px;
background:#0d5c2d;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#09411f;
}

.back{
display:inline-block;
margin-bottom:20px;
text-decoration:none;
font-weight:bold;
color:#0d5c2d;
}

</style>

</head>

<body>

<div class="container">

<a href="admin.html" class="back">⬅ Back to Dashboard</a>

<h2>Website Settings</h2>

<div class="card">

<label>Website Name</label>
<input type="text" id="siteName" value="Movara Shopping">

<label>Support Email</label>
<input type="email" id="email" value="movaraindustries@gmail.com">

<label>Support Mobile</label>
<input type="text" id="phone" value="+91 7983001102">

<label>Address</label>
<input type="text" id="address"
value="Near Primary School, Timarua, Etawah, Uttar Pradesh">

<button id="saveBtn">
Save Settings
</button>

</div>

<div class="card">

<h3>Admin Account</h3>

<label>Admin Email</label>
<input type="email"
value="movaraindustries@gmail.com"
readonly>

<button onclick="window.location='login.html'">
Logout
</button>

</div>

</div>

<script>

document.getElementById("saveBtn").onclick=function(){

alert("Settings Saved Successfully");

}

</script>

</body>
</html>
